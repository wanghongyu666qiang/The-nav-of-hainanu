<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>观澜湖校区地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a5276, #2980b9); color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 20px; }
    .header a { color: white; text-decoration: none; font-size: 14px; opacity: 0.8; }
    .header a:hover { opacity: 1; }
    .main { display: flex; justify-content: center; padding: 20px; }
    .main img { max-width: 100%; max-height: calc(100vh - 100px); border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="header">
    <h1>观澜湖校区</h1>
    <a href="selection.html">← 返回校区选择</a>
  </div>
  <div class="main">
    <img src="data/guanlanhu.png" alt="观澜湖校区地图" />
  </div>
</body>
</html>
