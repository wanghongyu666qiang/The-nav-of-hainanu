<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;display:flex;height:100vh;background:#f0f2f5;user-select:none}
#map-area{flex:1;display:flex;align-items:center;justify-content:center;background:#fff;margin:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);cursor:default}
#panel{width:230px;padding:20px;background:#fff;margin:12px 12px 12px 0;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;flex-direction:column;gap:14px}
h2{font-size:16px;color:#1a1a2e;border-bottom:2px solid #4a6cf7;padding-bottom:8px}
.mode-btn{padding:8px 0;border:2px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;text-align:center;transition:all .2s;background:#fff}
.mode-btn.active{border-color:#4a6cf7;background:#e6f1fb;color:#185fa5;font-weight:bold}
.mode-btn:hover{border-color:#4a6cf7}
.status-text{font-size:12px;color:#666;line-height:1.8}
.status-text b{color:#333}
.tag-start{display:inline-block;width:10px;height:10px;border-radius:50%;background:#e24b4b;margin-right:4px;vertical-align:middle}
.tag-end{display:inline-block;width:10px;height:10px;border-radius:50%;background:#4a6cf7;margin-right:4px;vertical-align:middle}
.btn-action{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-run{background:#4a6cf7;color:#fff}
.btn-run:hover{background:#3b5de7}
.btn-reset{background:#f0f0f0;color:#666}
.btn-reset:hover{background:#e0e0e0}
.result-box{background:#fef5f0;border:1px solid #f0c0a0;border-radius:8px;padding:12px;font-size:12px;line-height:1.8}
.result-box .dist{font-size:24px;font-weight:bold;color:#d85a30}
.spot{cursor:pointer;transition:r .15s}
.spot:hover{filter:brightness(1.15)}
.hint{font-size:11px;color:#aaa;text-align:center}
</style>
</head>

<script>
var spots=[{id:1,name:"第一食堂",x:120,y:100},{id:2,name:"行政楼",x:300,y:80},{id:3,name:"二号教学楼",x:480,y:80},{id:4,name:"九教",x:400,y:200},{id:5,name:"一田",x:200,y:240},{id:6,name:"书院宿舍楼",x:320,y:360},{id:7,name:"图书馆",x:530,y:230},{id:8,name:"南门",x:580,y:370},{id:9,name:"东门",x:150,y:400},{id:10,name:"游泳池",x:440,y:420}];
var edges=[[{w:0,c:0},{w:3,c:1},{w:Infinity,c:Infinity},{w:5,c:Infinity},{w:Infinity,c:Infinity},{w:6,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:6},{w:3,c:Infinity},{w:Infinity,c:Infinity}],[{w:3,c:1},{w:0,c:0},{w:2,c:4},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:2},{w:Infinity,c:10},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity}],[{w:Infinity,c:Infinity},{w:2,c:4},{w:0,c:0},{w:Infinity,c:2},{w:Infinity,c:3},{w:Infinity,c:Infinity},{w:3,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity}],[{w:5,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:2},{w:0,c:0},{w:6,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:3},{w:Infinity,c:Infinity},{w:Infinity,c:7},{w:Infinity,c:Infinity}],[{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:3},{w:6,c:Infinity},{w:0,c:0},{w:Infinity,c:4},{w:5,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:3,c:Infinity}],[{w:6,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:4},{w:0,c:0},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:5}],[{w:Infinity,c:Infinity},{w:Infinity,c:2},{w:3,c:Infinity},{w:Infinity,c:3},{w:5,c:Infinity},{w:Infinity,c:Infinity},{w:0,c:0},{w:6,c:Infinity},{w:5,c:Infinity},{w:Infinity,c:Infinity}],[{w:Infinity,c:6},{w:Infinity,c:10},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:6,c:Infinity},{w:0,c:0},{w:7,c:Infinity},{w:Infinity,c:4}],[{w:3,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:7},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:5,c:Infinity},{w:7,c:Infinity},{w:0,c:0},{w:Infinity,c:Infinity}],[{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:Infinity,c:Infinity},{w:3,c:Infinity},{w:Infinity,c:5},{w:Infinity,c:Infinity},{w:Infinity,c:4},{w:Infinity,c:Infinity},{w:0,c:0}]];
var selectedStart=null,selectedEnd=null,currentMode=0;
function selectSpot(idx){
if(selectedStart===null){selectedStart=idx;updateUI();return;}
if(selectedStart===idx){selectedStart=null;selectedEnd=null;updateUI();return;}
selectedEnd=idx;updateUI();runDijkstra();
}
function setMode(m){
currentMode=m;
document.getElementById('mode-walk').className='mode-btn'+(m===0?' active':'');
document.getElementById('mode-car').className='mode-btn'+(m===1?' active':'');
if(selectedStart!==null&&selectedEnd!==null)runDijkstra();
else updateRoadDisplay();
}
function updateRoadDisplay(){
var lines=document.querySelectorAll('#roads-layer line');
for(var i=0;i<lines.length;i++){
var t=parseInt(lines[i].getAttribute('data-type'));
var show=(currentMode===t);
lines[i].setAttribute('opacity',show?'1':'0.15');
}
}
function updateUI(){
var sp=spots;
document.getElementById('lbl-start').textContent=selectedStart!==null?sp[selectedStart].name:'未选择';
document.getElementById('lbl-end').textContent=selectedEnd!==null?sp[selectedEnd].name:'未选择';
//更新景点颜色
var groups=document.querySelectorAll('#spots-layer .spot');
for(var i=0;i<groups.length;i++){
var c=groups[i].querySelectorAll('circle')[1];
if(i===selectedStart){c.setAttribute('fill','#e24b4b');c.setAttribute('stroke','#a32d2d');c.setAttribute('r','10');}
else if(i===selectedEnd){c.setAttribute('fill','#4a6cf7');c.setAttribute('stroke','#185fa5');c.setAttribute('r','10');}
else{c.setAttribute('fill','#7f77dd');c.setAttribute('stroke','#534ab7');c.setAttribute('r','7');}
}
}
function runDijkstra(){
var s=selectedStart,e=selectedEnd;
if(s===null||e===null)return;
var n=spots.length;
var dist=new Array(n),prev=new Array(n),visited=new Array(n);
for(var i=0;i<n;i++){
var w=currentMode===0?edges[s][i].w:edges[s][i].c;
dist[i]=w;prev[i]=(w<Infinity)?s:-1;visited[i]=false;
}
visited[s]=true;dist[s]=0;prev[s]=-1;
for(var i=0;i<n-1;i++){
var u=-1,mini=Infinity;
for(var j=0;j<n;j++){if(!visited[j]&&dist[j]<mini){mini=dist[j];u=j;}}
if(u===-1)break;visited[u]=true;
for(var v=0;v<n;v++){
if(visited[v])continue;
var ew=currentMode===0?edges[u][v].w:edges[u][v].c;
if(dist[u]!==Infinity&&ew!==Infinity&&dist[u]+ew<dist[v]){
dist[v]=dist[u]+ew;prev[v]=u;
}
}
}
//绘制路径
var layer=document.getElementById('path-layer');
layer.innerHTML='';
if(dist[e]===Infinity){
document.getElementById('result-panel').innerHTML='<div class="result-box" style="background:#fcebeb;border-color:#f09595"><div style="color:#e24b4b;font-weight:bold">无可达路径</div></div>';
return;
}
var path=[];var cur=e;
while(cur!==-1){path.push(cur);cur=prev[cur];}
path.reverse();
//光晕
var pts='';
for(var i=0;i<path.length;i++){pts+=spots[path[i]].x+','+spots[path[i]].y;if(i<path.length-1)pts+=' ';}
layer.innerHTML+='<polyline points="'+pts+'" fill="none" stroke="#f5c4b3" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>';
layer.innerHTML+='<polyline points="'+pts+'" fill="none" stroke="#e24b4b" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>';
//方向点
for(var i=0;i<path.length-1;i++){
var mx=(spots[path[i]].x+spots[path[i+1]].x)/2;
var my=(spots[path[i]].y+spots[path[i+1]].y)/2;
layer.innerHTML+='<circle cx="'+mx+'" cy="'+my+'" r="4" fill="#fff" stroke="#e24b4b" stroke-width="2"/>';
}
//结果显示
var html='<div class="result-box"><div class="dist">'+dist[e]+'</div><div style="color:#999;font-size:11px;margin-bottom:8px">最短距离</div><div style="font-size:13px;line-height:1.6">';
for(var i=0;i<path.length;i++){
if(i>0)html+='<span style="color:#d85a30;margin:0 4px">\u2192</span>';
html+='<strong>'+spots[path[i]].name+'</strong>';
}
html+='</div></div>';
document.getElementById('result-panel').innerHTML=html;
updateUI();
updateRoadDisplay();
}
function resetAll(){
selectedStart=null;selectedEnd=null;
document.getElementById('lbl-start').textContent='未选择';
document.getElementById('lbl-end').textContent='未选择';
document.getElementById('result-panel').innerHTML='<div class="hint">点击地图上的景点选择起点和终点</div>';
document.getElementById('path-layer').innerHTML='';
updateUI();
updateRoadDisplay();
}
updateRoadDisplay();
</script>
</body>
</html>
