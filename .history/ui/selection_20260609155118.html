<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>海南大学导航系统 - 校区选择</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
        background: linear-gradient(
          135deg,
          #0f2027 0%,
          #203a43 50%,
          #2c5364 100%
        );
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
      }

      .header {
        text-align: center;
        margin-bottom: 40px;
      }

      .header h1 {
        font-size: 42px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 4px;
      }

      .header .subtitle {
        font-size: 16px;
        color: rgba(255, 255, 255, 0.5);
        margin-top: 10px;
        letter-spacing: 2px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        max-width: 960px;
        width: 100%;
      }

      .card {
        position: relative;
        border-radius: 16px;
        overflow: hidden;
        cursor: pointer;
        text-decoration: none;
        aspect-ratio: 4 / 3;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
        transition:
          transform 0.35s ease,
          box-shadow 0.35s ease;
      }

      .card:hover {
        transform: translateY(-6px) scale(1.03);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
      }

      .card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
      }

      .card:hover img {
        transform: scale(1.08);
      }

      .label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
        padding: 40px 20px 18px;
        color: #fff;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 3px;
        text-align: center;
      }

      .label small {
        display: block;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.65);
        margin-top: 4px;
      }

      .footer {
        margin-top: 36px;
        text-align: center;
      }

      .back-btn {
        display: inline-block;
        padding: 10px 32px;
        border: 1.5px solid rgba(255, 255, 255, 0.25);
        border-radius: 30px;
        color: rgba(255, 255, 255, 0.6);
        text-decoration: none;
        font-size: 15px;
        letter-spacing: 2px;
        transition: all 0.3s ease;
      }

      .back-btn:hover {
        border-color: rgba(255, 255, 255, 0.7);
        color: #fff;
        background: rgba(255, 255, 255, 0.08);
      }

      /* 小屏幕变单列 */
      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
          gap: 16px;
        }
        .header h1 {
          font-size: 28px;
        }
        .label {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>海南大学导航系统</h1>
      <p class="subtitle">CAMPUS NAVIGATION · 请选择校区</p>
    </div>

    <div class="grid">
      <a class="card" href="map_haidian.html">
        <img src="../data/haidian1.jpg" alt="海甸校区" />
        <div class="label">海甸校区<small>主校区 · 海口市美兰区</small></div>
      </a>

      <a class="card" href="zhanzuo.html">
        <img src="../data/zhanzuo.jpg" alt="瞻州校区" />
        <div class="label">瞻州校区<small>儋州校区 · 热带农林特色</small></div>
      </a>

      <a class="card" href="guanlanhu.html">
        <img src="../data/guanlanhu1.jpg" alt="观澜湖校区" />
        <div class="label">观澜湖校区<small>海口观澜湖片区</small></div>
      </a>

      <a class="card" href="#">
        <img src="../data/sanya.jpg" alt="三亚校区" />
        <div class="label">三亚校区<small>地图待补充</small></div>
      </a>
    </div>

    <div class="footer">
      <a class="back-btn" href="javascript:window.close()">← 返回主菜单</a>
    </div>
  </body>
</html>
