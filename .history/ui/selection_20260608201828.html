<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>海南大学导航系统 - 校区选择</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 42px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 4px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
    }

    .header .subtitle {
      font-size: 18px;
      color: rgba(255, 255, 255, 0.65);
      margin-top: 12px;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 30px;
      max-width: 1000px;
      width: 100%;
    }

    .card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: inherit;
      transition: filter 0.3s ease;
    }

    .card:hover::before {
      filter: brightness(1.15);
    }

    .card-content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .card-icon {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }

    .card-title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .card-desc {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.75);
      margin-top: 8px;
      letter-spacing: 1px;
    }

    .card-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 4px 12px;
      font-size: 14px;
      letter-spacing: 1px;
      z-index: 1;
    }

    /* ---- 每个卡片的渐变配色 ---- */
    .card-haidian {
      background: linear-gradient(135deg, #1a73e8 0%, #6c8cff 100%);
    }
    .card-zhanzuo {
      background: linear-gradient(135deg, #e87d1a 0%, #ffb347 100%);
    }
    .card-guanlanhu {
      background: linear-gradient(135deg, #1a8a5a 0%, #43c97f 100%);
    }
    .card-new {
      background: linear-gradient(135deg, #8e2de2 0%, #c471f5 100%);
    }

    .footer {
      margin-top: 40px;
      text-align: center;
    }

    .back-btn {
      display: inline-block;
      padding: 10px 32px;
      border: 1.5px solid rgba(255, 255, 255, 0.3);
      border-radius: 30px;
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 15px;
      letter-spacing: 2px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      border-color: rgba(255, 255, 255, 0.7);
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
    }

    /* 响应式：小屏幕变单列 */
    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
        gap: 20px;
      }
      .header h1 {
        font-size: 28px;
      }
      .card {
        min-height: 200px;
      }
      .card-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>海南大学导航系统</h1>
    <p class="subtitle">CAMPUS NAVIGATION · 请选择校区</p>
  </div>

  <div class="grid">
    <!-- 海甸校区 -->
    <a class="card card-haidian" href="map_haidian.html">
      <span class="card-badge">海甸</span>
      <div class="card-content">
        <span class="card-icon">🏫</span>
        <div class="card-title">海甸校区</div>
        <div class="card-desc">主校区 · 海口市美兰区</div>
      </div>
    </a>

    <!-- 瞻州校区 -->
    <a class="card card-zhanzuo" href="zhanzuo.html">
      <span class="card-badge">瞻州</span>
      <div class="card-content">
        <span class="card-icon">🌴</span>
        <div class="card-title">瞻州校区</div>
        <div class="card-desc">儋州校区 · 热带农林特色</div>
      </div>
    </a>

    <!-- 观澜湖校区 -->
    <a class="card card-guanlanhu" href="guanlanhu.html">
      <span class="card-badge">观澜湖</span>
      <div class="card-content">
        <span class="card-icon">🏞️</span>
        <div class="card-title">观澜湖校区</div>
        <div class="card-desc">新校区 · 海口观澜湖片区</div>
      </div>
    </a>

    <!-- 第4校区（占位） -->
    <a class="card card-new" href="#">
      <span class="card-badge">待定</span>
      <div class="card-content">
        <span class="card-icon">📍</span>
        <div class="card-title">【新校区】</div>
        <div class="card-desc">点击配置 · 待补充图片与名称</div>
      </div>
    </a>
  </div>

  <div class="footer">
    <a class="back-btn" href="javascript:window.close()">← 返回主菜单</a>
  </div>
</body>
</html>
